name: CD

on:
  push:
    branches: [main]
    tags: ["krai-frontend-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/krai/krai-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps image tag
        if: success() && github.event_name != 'pull_request'
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git clone https://x-access-token:${GITOPS_PAT}@github.com/red512/krai-gitops.git /tmp/krai-gitops
          cd /tmp/krai-gitops
          sed -i "s|tag:.*|tag: \"${SHORT_SHA}\"|" helm/krai-frontend-chart/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/krai-frontend-chart/values.yaml
          git commit -m "chore: update krai-frontend image tag to ${SHORT_SHA}"
          git push

  notify:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: always()
    steps:
      - name: Short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - name: Slack notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ needs.docker.result == 'success' && ':white_check_mark:' || ':x:' }} *krai-frontend* publish `${{ steps.sha.outputs.short }}` — ${{ needs.docker.result }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
